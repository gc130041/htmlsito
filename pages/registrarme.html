<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrarme | Tconecta</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="../css/register.css">
</head>
<body>
<div class="register-card">
<div class="register-left">
<span class="welcome-text">Crear cuenta</span>
<div class="logo-container">
<img src="../img/logo.png" alt="Tconecta Logo" style="height: 45px;">
<span>TCONECTA</span>
</div>
<p class="subtitle">Registra tu cuenta para gestionar rutas, estaciones e incidencias en un solo lugar.</p>

        <form action="#">
            <div class="input-group">
                <i class="far fa-building"></i>
                <input type="text" placeholder="Entidad Operadora" required>
            </div>

            <div class="input-group">
                <i class="far fa-user"></i>
                <input type="text" placeholder="Nombre del administrador" required>
            </div>

            <div class="input-group">
                <i class="far fa-envelope"></i>
                <input type="email" placeholder="Correo electrónico" required>
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" placeholder="Teléfono" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Crear contraseña" required>
            </div>

            <button type="submit" class="auth-btn register-btn">Registrarme</button>
        </form>

        <p class="signin-link">
            ¿Ya tienes una cuenta? <a href="../index.html">Iniciar Sesión</a>
        </p>
    </div>

    <div class="panel-right register-right">
        <div class="right-content relative-content">
            <div class="right-logo">
                <img src="../img/logo.png" alt="Tconecta Logo" style="height: 80px; margin-bottom: 20px;">
                <span>TCONECTA ADMIN</span>
            </div>
            <p>Centraliza operaciones, mejora la experiencia de los usuarios y toma mejores decisiones con datos claros de tu red de transporte.</p>
        </div>
    </div>
</div>
</body>
</html>
