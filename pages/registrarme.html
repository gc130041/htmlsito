<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrarme | Tconecta</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="../css/login.css">
</head>
<body>
<div class="login-card">
    <div class="login-left">
        <span class="welcome-text">Crear cuenta Admin</span>
        
        <!-- Contenedor del logo ajustado -->
        <div class="logo-container" style="width: 100%; justify-content: center; margin-bottom: 20px;">
            <img src="../img/logo.png" alt="Tconecta Logo" style="height: 55px; margin: 0 auto; display: block;">
        </div>
        
        <p class="subtitle" style="margin: 0 auto 25px;">Registra tus credenciales autorizadas para administrar la red de transporte en un solo lugar.</p>

        <!-- Formulario adaptado al RegisterRequestDto del Auth Server -->
        <form action="#">
            <div class="input-group">
                <i class="far fa-id-card"></i>
                <input type="text" placeholder="CUI (13 dígitos)" required pattern="\d{13}" title="El CUI debe tener exactamente 13 dígitos">
            </div>

            <div class="input-group">
                <i class="far fa-envelope"></i>
                <input type="email" placeholder="Correo electrónico" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Contraseña (Mín. 6 caracteres)" required minlength="6">
            </div>

            <button type="submit" class="sign-in-btn auth-btn">Registrarme</button>
        </form>

        <p class="signup-link">
            ¿Ya tienes una cuenta? <a href="../index.html">Iniciar Sesión</a>
        </p>
    </div>
</div>
</body>
</html>
