<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Contraseña | Tconecta</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="../css/login.css">
</head>
<body>
<div class="login-card">
    <div class="login-left">
        <span class="welcome-text">Recuperar acceso</span>
        
        <!-- Contenedor del logo ajustado -->
        <div class="logo-container" style="width: 100%; justify-content: center; margin-bottom: 20px;">
            <img src="../img/logo.png" alt="Tconecta Logo" style="height: 55px; margin: 0 auto; display: block;">
        </div>
        
        <p class="subtitle" style="margin: 0 auto 35px;">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

        <form action="#">
            <div class="input-group">
                <i class="far fa-envelope"></i>
                <input type="email" placeholder="Correo electrónico" required>
            </div>

            <button type="submit" class="sign-in-btn auth-btn">Enviar enlace</button>
        </form>

        <p class="signup-link">
            Volver al inicio de sesión <a href="../index.html">Iniciar Sesión</a>
        </p>
    </div>
</div>
</body>
</html>
