<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contrasena | Gestor de Restaurante</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/recover.css">
</head>
<body>
    <div class="recover-card">
        <section class="panel panel-white">
            <div class="white-content">
                <span class="welcome-text">Recuperar acceso</span>
                <div class="logo-container">
                    <i class="fas fa-utensils"></i>
                    <span>GESTOR RESTAURANTE</span>
                </div>

                <p class="subtitle">Ingresa tu correo y te enviaremos un enlace para restablecer tu contrasena.</p>

                <form action="#">
                    <div class="input-group">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="Correo electronico" required>
                    </div>

                    <button type="submit" class="auth-btn action-btn">Enviar enlace</button>
                </form>

                <p class="back-link">Volver al inicio de sesion <a href="index.html">Iniciar Sesion</a></p>
            </div>
        </section>

        <section class="panel panel-orange" aria-hidden="true">
            <div class="orange-content">
                <i class="fas fa-key"></i>
                <h2>RECUPERAR</h2>
                <p>Tu operacion no se detiene. Recupera acceso rapido y continua gestionando reservas, inventario y equipos sin perder tiempo.</p>
            </div>
        </section>
    </div>
</body>
</html>
