<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tconecta | Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="login-card">
    <div class="login-left">
        <span class="welcome-text">Bienvenido a</span>
        
        <!-- Contenedor del logo ajustado -->
        <div class="logo-container" style="width: 100%; justify-content: center; margin-bottom: 20px;">
            <img src="img/logo.png" alt="Tconecta Logo" style="height: 55px; margin: 0 auto; display: block;">
        </div>
        
        <p class="subtitle" style="margin: 0 auto 35px;">Inicia sesión para administrar estaciones, rutas y alertas de tu red de transporte público desde un solo panel.</p>

        <form action="#">
            <div class="input-group">
                <i class="far fa-user"></i>
                <input type="text" placeholder="Usuario o correo" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Contraseña" required>
            </div>

            <div class="forgot-pass">
                <a href="pages/recuperarContraseña.html">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="sign-in-btn auth-btn">Iniciar Sesión</button>
        </form>

        <p class="signup-link">
            ¿No tienes acceso? <a href="pages/registrarme.html">Registrarme</a>
        </p>
    </div>
</div>
</body>
</html>
